name: CI

on:
  pull_request:
  push:
    branches: [master]

# Minimal permissions for the jobs
permissions:
  contents: read

# Cancel any in-progress runs for the same ref (branch or PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (types / eslint / format)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20] # Node.js version
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint:check

      - name: Prettier format check
        run: npm run format:check

      # Check that no files were modified by the scripts above
      # - name: Ensure working tree clean
      #   run: |
      #     if [ -n "$(git status --porcelain)" ]; then
      #       echo "Repository dirty after checks (скрипты что-то модифицировали)."
      #       git diff
      #       exit 1
      #     fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

