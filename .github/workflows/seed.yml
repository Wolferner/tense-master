name: Seed Production Database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx tsx server/infastructure/seeds/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
