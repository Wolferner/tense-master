name: Seed Production Database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Debug env
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is EMPTY"
          else
            echo "DATABASE_URL is set (${#DATABASE_URL} chars)"
          fi

      - run: npx tsx server/infastructure/seeds/seed.ts
